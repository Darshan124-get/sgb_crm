<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products & Inventory | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .inventory-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-left: 0.5rem;
        }
        .inv-tab {
            padding: 0.75rem 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .inv-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .filter-bar {
            background: white;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            padding: 1rem;
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .product-img {
            width: 100%;
            height: 160px;
            background: #f1f5f9;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #cbd5e1;
            object-fit: cover;
        }
        .stock-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .stock-in { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .stock-low { background: #fffbeb; color: #92400e; border: 1px solid #fef3c7; }
        .stock-out { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        
        .cat-tree-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cat-tree-item:hover { background: #f8fafc; }
        .nested-cat { padding-left: 2rem; border-left: 2px solid #e2e8f0; }

        .inv-table-container {
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .inv-table {
            width: 100%;
            border-collapse: collapse;
        }
        .inv-table th {
            text-align: left;
            padding: 1.15rem 1.25rem;
            background: #f8fafc;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #475569;
            border-bottom: 2px solid #f1f5f9;
        }
        .inv-table td {
            padding: 1.25rem 1.25rem;
            border-top: 1px solid #f1f5f9;
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 500;
        }
        .inv-table tr:hover td {
            background-color: #fcfdfe;
        }
        .btn-action {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-action:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: #f0fdf4;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-action[onclick*="delete"]:hover {
            color: #ef4444;
            border-color: #fee2e2;
            background: #fef2f2;
        }

        .premium-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .inv-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .inv-table th {
            background: #f8fafc;
            padding: 1rem 1.25rem;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            border-bottom: 2px solid #f1f5f9;
        }
        .inv-table td {
            vertical-align: middle;
            transition: background 0.2s;
        }
        
        .stock-badge {
            font-variant-numeric: tabular-nums;
        }

        .premium-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .form-control-premium {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            background: #fcfcfd;
        }
        .form-control-premium:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <header class="topbar">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="globalSearch" placeholder="Search products, SKUs...">
            </div>
            <div class="profile-section">
                <div id="lowStockWarning" class="hidden" style="color: #ef4444; margin-right: 1.5rem; cursor: pointer;">
                    <i class="fas fa-triangle-exclamation"></i> Low Stock Alert
                </div>
                <span class="profile-name" id="profileName">Administrator</span>
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
            </div>
        </header>

        <div class="content-body">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:2rem;">
                <div>
                    <h1 style="font-size:1.75rem; font-weight:700; color:#0f172a; margin-bottom:0.1rem; letter-spacing:-0.02em;">Products & Inventory</h1>
                    <p style="color:#64748b; font-size:0.9rem; font-weight:500;">Manage your product catalog and real-time stock levels.</p>
                </div>
                <div style="display:flex; gap:0.75rem; align-items:center;">
                    <button class="btn btn-outline" id="refreshDataBtn" style="height:42px;"><i class="fas fa-sync"></i></button>
                    <button class="btn btn-outline" id="addCategoryBtn" style="height:42px; border-color:var(--primary-color); color:var(--primary-color); font-weight:700;">
                        <i class="fas fa-folder-plus"></i> New Category
                    </button>
                    <button class="btn" id="addProductBtn" style="background:var(--primary-color); color:white; height:42px; padding:0 1.5rem; font-weight:700;">
                        <i class="fas fa-plus" style="margin-right:0.5rem;"></i> Add Product
                    </button>
                </div>
            </div>

            <div class="filter-bar" style="margin-bottom:1.5rem;">
                <div class="filter-group">
                    <span class="filter-label">Category</span>
                    <select id="filterCategory" class="form-control-premium" style="width:160px; height:38px; font-size:0.8rem; padding:0 0.75rem;">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Availability</span>
                    <select id="filterStockStatus" class="form-control-premium" style="width:140px; height:38px; font-size:0.8rem; padding:0 0.75rem;">
                        <option value="all">All Items</option>
                        <option value="in">In Stock</option>
                        <option value="low">Low Stock</option>
                        <option value="out">Out of Stock</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Status</span>
                    <select id="filterActiveStatus" class="form-control-premium" style="width:130px; height:38px; font-size:0.8rem; padding:0 0.75rem;">
                        <option value="all">Any Status</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="filter-group" style="margin-left:auto;">
                    <span class="filter-label">Sort By</span>
                    <select id="sortBy" class="form-control-premium" style="width:160px; height:38px; font-size:0.8rem; padding:0 0.75rem;">
                        <option value="newest">Recently Added</option>
                        <option value="oldest">Oldest First</option>
                        <option value="name_asc">Name (A-Z)</option>
                        <option value="name_desc">Name (Z-A)</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                        <option value="stock_desc">Highest Stock</option>
                    </select>
                </div>
            </div>

            <div class="inventory-tabs">
                <div class="inv-tab active" data-tab="products">Products</div>
                <div class="inv-tab" data-tab="categories">Categories</div>
                <div class="inv-tab" data-tab="stock">Stock Management</div>
                <div class="inv-tab" data-tab="logs">Inventory Logs</div>
            </div>

            <div id="inventoryContent">
                <!-- Dynamic Content Here -->
                <div style="padding: 3rem; text-align: center; color: #94a3b8;">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top: 1rem;">Loading module assets...</p>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Root -->
<div id="globalModal" class="modal"></div>

<script src="../../js/config.js"></script>
<script src="../../js/components.js"></script>
<script src="../../js/decision-engine.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
