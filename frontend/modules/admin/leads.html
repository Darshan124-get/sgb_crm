<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Management | Admin | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text"
                        placeholder="Search leads..."></div>
                <div class="profile-section"><span class="profile-name" id="profileName">Administrator</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>
            <div class="content-body">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                    <div>
                        <h1 style="font-size:1.5rem;font-weight:800;color:#1e293b;">Lead Management</h1>
                        <p style="color:#64748b;font-size:0.875rem;">All team leads — assign, filter, track and manage.
                        </p>
                    </div>
                    <!-- <button class="btn-add-lead" onclick="openAddLeadModal()">
                    <i class="fas fa-plus"></i> Add Lead
                </button> -->
                    <div
                        style="background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; color: #64748b; font-weight: 600;">
                        <i class="fas fa-lock mr-1"></i> New Lead Creation Disabled
                    </div>
                </div>

                <!-- Lead Nav Tabs -->
                <div id="lead-nav-placeholder"></div>

                <!-- Lead Content Area -->
                <div id="lead-content-area" class="premium-card"
                    style="margin-top:1rem;min-height:400px;overflow-x:auto;"></div>
            </div>
        </main>
    </div>
    <script src="../../js/config.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/decision-engine.js"></script>
    <script src="js/leads.js"></script>
</body>

</html>
