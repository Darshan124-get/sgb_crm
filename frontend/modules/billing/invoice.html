<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Viewer | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e293b;
            --border-color: #000;
        }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        
        .invoice-classic {
            background: white;
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            color: #000;
            font-size: 11px;
            line-height: 1.3;
        }

        .invoice-title-bar {
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            padding: 4px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
        }

        .invoice-grid-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .border-r { border-right: 1px solid var(--border-color); }
        .border-b { border-bottom: 1px solid var(--border-color); }

        .company-section, .address-section {
            padding: 8px;
        }

        .company-name {
            font-size: 16px;
            font-weight: 900;
            margin: 0 0 4px 0;
        }

        .customer-name {
            font-size: 13px;
            font-weight: bold;
            margin: 4px 0;
        }

        .label-small {
            font-size: 9px;
            color: #444;
            display: block;
            margin-bottom: 2px;
        }

        .meta-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .meta-cell {
            padding: 4px 8px;
        }

        .meta-cell .label {
            display: block;
            font-size: 9px;
            color: #444;
        }

        .meta-cell .value {
            font-weight: bold;
            font-size: 11px;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            border-bottom: 1px solid var(--border-color);
        }

        .items-table th {
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 6px;
            font-size: 10px;
            text-transform: uppercase;
            background: #fff;
        }

        .items-table td {
            border-right: 1px solid var(--border-color);
            padding: 4px 8px;
            vertical-align: top;
        }

        .items-table th:last-child, .items-table td:last-child {
            border-right: none;
        }

        .empty-row td {
            height: 20px;
        }

        .items-table tfoot td {
            border-top: 1px solid var(--border-color);
            padding: 6px 8px;
        }

        .subtotal-row td, .tax-row td {
            border-top: 1px solid #ddd;
        }

        .grand-total-row td {
            border-top: 1px solid var(--border-color);
            background: #f9f9f9;
        }

        .words-section, .tax-words {
            padding: 8px;
        }

        .tax-breakdown-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }

        .tax-breakdown-table th, .tax-breakdown-table td {
            border: 1px solid var(--border-color);
            padding: 4px;
        }

        .invoice-footer {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
        }

        .footer-left {
            padding: 8px;
        }

        .footer-right {
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .declaration {
            font-size: 9px;
            margin-bottom: 10px;
        }

        .action-bar-v3 {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: #1e293b;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .action-bar-v3 button {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .print-btn { background: #10b981; color: #fff; }
        .close-btn { background: #475569; color: #fff; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .invoice-classic { 
                margin: 0; 
                width: 100%; 
                max-width: none; 
                border: 1px solid #000;
            }
        }

    </style>
</head>
<body style="background-color: #f1f5f9; min-height: 100vh; padding: 2rem 0;">

    <div id="pageContent">
        <!-- Dynamic Content from invoice-view.js -->
        <div style="text-align:center; padding:5rem;">
            <i class="fas fa-circle-notch fa-spin" style="font-size:3rem; color:var(--primary-color);"></i>
            <p style="margin-top:1rem; color:#64748b; font-weight:600;">Loading secure invoice data...</p>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/components.js"></script>
    <script src="js/invoice-view.js"></script>
</body>
</html>
