<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="brand-logo">
                    <i class="fas fa-leaf"></i>
                </div>
                <h1>SGB Agro CRM</h1>
                <p>Enterprise Agricultural Management</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="identifier">Email or Phone Number</label>
                    <input type="text" id="identifier" placeholder="Email or Phone Number" required>
                </div>
                <div class="form-group">
                    <label for="password">Security Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="pw-toggle" id="togglePassword">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn">Sign In to Dashboard</button>
                <div id="message" style="margin-top: 1.5rem; text-align: center; color: #ef4444; font-size: 0.875rem; font-weight: 500;"></div>
            </form>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
