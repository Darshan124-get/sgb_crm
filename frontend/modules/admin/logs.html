<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="dashboard-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <header class="topbar">
            <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search..."></div>
            <div class="profile-section"><span class="profile-name" id="profileName">Administrator</span><div class="avatar"><i class="fa-solid fa-user"></i></div></div>
        </header>
        <div class="content-body" id="pageContent">
            <div class="page-header">
                <div class="header-left">
                    <h1 class="page-title">System Logs</h1>
                    <p class="page-subtitle">Complete audit trail of system activities</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="btnRefreshLogs">
                        <i class="fa-solid fa-arrows-rotate"></i> Refresh
                    </button>
                </div>
            </div>

            <div class="data-card">
                <div class="table-container">
                    <table class="data-table" id="logsTable">
                        <thead>
                            <tr>
                                <th style="width: 180px;">Timestamp</th>
                                <th style="width: 150px;">User</th>
                                <th style="width: 120px;">Module</th>
                                <th style="width: 200px;">Action</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <tr>
                                <td colspan="5" class="loading-state">
                                    <i class="fa-solid fa-circle-notch fa-spin"></i> Loading system logs...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
    <script src="../../js/config.js"></script>
    <script src="../../js/components.js"></script>
<script src="../../js/decision-engine.js"></script>
    <script src="js/logs.js"></script>
</body>
</html>
