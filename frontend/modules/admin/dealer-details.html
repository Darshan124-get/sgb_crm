<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Details | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
        }

        .info-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .value {
            font-size: 1rem;
            color: #1e293b;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <header class="topbar">
                <button onclick="history.back()"
                    style="background:none;border:none;color:#64748b;cursor:pointer;display:flex;align-items:center;gap:0.5rem;"><i
                        class="fas fa-arrow-left"></i> Back to List</button>
                <div class="profile-section"><span class="profile-name" id="profileName">Admin</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>
            <div class="content-body">
                <div id="loader" style="padding: 5rem; text-align: center;"><i
                        class="fas fa-circle-notch fa-spin fa-2x"></i></div>

                <div id="content" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;">
                        <div>
                            <h1 id="d-name" style="font-size:2rem;font-weight:800;color:#1e293b;margin:0;">Dealer Name
                            </h1>
                            <p id="d-location" style="color:#64748b;font-size:1rem;">City, State</p>
                        </div>
                        <div id="d-status-badge"></div>
                    </div>

                    <div class="stats-row">
                        <div class="stat-card">
                            <div class="stat-label">Total Orders</div>
                            <div id="s-orders" class="stat-val">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total Business</div>
                            <div id="s-business" class="stat-val">₹0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Outstanding Balance</div>
                            <div id="s-balance" class="stat-val" style="color:#ef4444;">₹0</div>
                        </div>
                    </div>

                    <div class="detail-grid">
                        <div class="info-card">
                            <h3
                                style="margin-top:0;margin-bottom:1.25rem;font-size:1.1rem;border-bottom:1px solid #f1f5f9;padding-bottom:0.5rem;">
                                Contact Information</h3>

                            <div class="label">Primary Phone</div>
                            <div id="d-phone" class="value">-</div>

                            <div class="label">Alternate Phone</div>
                            <div id="d-alt-phone" class="value">-</div>

                            <div class="label">Email Address</div>
                            <div id="d-email" class="value">-</div>

                            <div class="label">Contact Person</div>
                            <div id="d-contact" class="value">-</div>

                            <div class="label">Address</div>
                            <div id="d-address" class="value" style="font-size:0.9rem;line-height:1.4;">-</div>
                        </div>

                        <div class="premium-card" style="padding:1.5rem;">
                            <h3 style="margin-top:0;margin-bottom:1.25rem;font-size:1.1rem;">Recent Orders</h3>
                            <table style="width:100%;border-collapse:collapse;">
                                <thead>
                                    <tr style="text-align:left;border-bottom:2px solid #f1f5f9;">
                                        <th style="padding:0.75rem;font-size:0.75rem;color:#64748b;">ORDER ID</th>
                                        <th style="padding:0.75rem;font-size:0.75rem;color:#64748b;">DATE</th>
                                        <th style="padding:0.75rem;font-size:0.75rem;color:#64748b;">STATUS</th>
                                        <th style="padding:0.75rem;font-size:0.75rem;color:#64748b;text-align:right;">
                                            AMOUNT</th>
                                    </tr>
                                </thead>
                                <tbody id="orderList">
                                    <!-- Orders will be injected here -->
                                </tbody>
                            </table>
                            <div style="margin-top:1.5rem;text-align:center;">
                                <a href="orders.html"
                                    style="color:#3b82f6;text-decoration:none;font-size:0.875rem;font-weight:600;">View
                                    All Orders <i class="fas fa-chevron-right" style="font-size:0.7rem;"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="js/dealer-details.js"></script>
</body>

</html>
