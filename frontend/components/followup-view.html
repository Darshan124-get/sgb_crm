<div class="followup-dashboard fade-in">

            <div class="section-body" id="todayFollowList">
                <div class="empty-mini">Loading...</div>

        <div class="followup-section upcoming-section">
            <div class="section-header upcoming">
                <i class="fa-solid fa-calendar-week"></i> Upcoming
