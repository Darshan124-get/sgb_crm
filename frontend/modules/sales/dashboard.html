<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard | SGB Agro CRM</title>
    <meta name="description" content="Sales rep personal dashboard — my leads, pipeline, tasks and revenue.">
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="dashboard-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <header class="topbar">
            <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search my leads..."></div>
            <div class="profile-section">
                <div style="margin-right:1.5rem;position:relative;cursor:pointer;">
                    <i class="far fa-bell" style="font-size:1.25rem;color:#6b7280;"></i>
                    <span id="notifBadge" style="position:absolute;top:-4px;right:-4px;background:#ef4444;color:white;border-radius:50%;width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700;">0</span>
                </div>
                <span class="profile-name" id="profileName">Sales Rep</span>
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
            </div>
        </header>

        <div class="content-body" id="contentBody">
            <div style="margin-bottom:2rem;display:flex;justify-content:space-between;align-items:flex-end;">
                <div>
                    <h1 style="font-size:1.5rem;font-weight:800;color:#1e293b;" id="welcomeMessage">My Dashboard</h1>
                    <p style="color:#64748b;font-size:0.875rem;">Your personal performance — leads, tasks, conversions.</p>
                </div>
                <span id="todayDate" style="font-size:0.8rem;color:#94a3b8;font-weight:500;"></span>
            </div>

            <!-- KPI Cards -->
            <div class="stats-grid" style="margin-bottom:2.5rem;">
                <div class="stat-card premium-card" style="display:flex;align-items:center;gap:1.25rem;padding:1.5rem;border-bottom:3px solid #3b82f6;">
                    <div style="width:48px;height:48px;border-radius:12px;background:#eff6ff;color:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:1.25rem;"><i class="fas fa-bullseye"></i></div>
                    <div>
                        <p style="font-size:0.7rem;font-weight:600;color:#64748b;text-transform:uppercase;">My Leads Today / MTD</p>
                        <p style="font-size:1.5rem;font-weight:800;"><span id="leadsToday">0</span> <span style="font-size:0.875rem;color:#94a3b8;font-weight:500;">/ <span id="leadsMTD">0</span></span></p>
                    </div>
                </div>
                <div class="stat-card premium-card" style="display:flex;align-items:center;gap:1.25rem;padding:1.5rem;border-bottom:3px solid #ef4444;">
                    <div style="width:48px;height:48px;border-radius:12px;background:#fef2f2;color:#ef4444;display:flex;align-items:center;justify-content:center;font-size:1.25rem;"><i class="fas fa-clock"></i></div>
                    <div>
                        <p style="font-size:0.7rem;font-weight:600;color:#64748b;text-transform:uppercase;">Overdue Tasks</p>
                        <p style="font-size:1.5rem;font-weight:800;color:#ef4444;" id="urgentAlerts">0</p>
                    </div>
                </div>
                <div class="stat-card premium-card" style="display:flex;align-items:center;gap:1.25rem;padding:1.5rem;border-bottom:3px solid #10b981;">
                    <div style="width:48px;height:48px;border-radius:12px;background:#ecfdf5;color:#10b981;display:flex;align-items:center;justify-content:center;font-size:1.25rem;"><i class="fas fa-chart-line"></i></div>
                    <div>
                        <p style="font-size:0.7rem;font-weight:600;color:#64748b;text-transform:uppercase;">My Conv. Rate</p>
                        <p style="font-size:1.5rem;font-weight:800;" id="conversionRate">0%</p>
                    </div>
                </div>
                <div class="stat-card premium-card" style="display:flex;align-items:center;gap:1.25rem;padding:1.5rem;border-bottom:3px solid #f59e0b;">
                    <div style="width:48px;height:48px;border-radius:12px;background:#fffbeb;color:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:1.25rem;"><i class="fas fa-wallet"></i></div>
                    <div>
                        <p style="font-size:0.7rem;font-weight:600;color:#64748b;text-transform:uppercase;">Advance Collected</p>
                        <p style="font-size:1.5rem;font-weight:800;" id="revenueMTD">₹0</p>
                    </div>
                </div>
            </div>

            <!-- Main Panels -->
            <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:2rem;margin-bottom:2.5rem;">
                <!-- Urgent Tasks -->
                <div class="smart-panel premium-card" style="overflow:hidden;">
                    <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #e2e8f0;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <h3 style="font-size:1rem;font-weight:700;color:#0f172a;">🚨 My Urgent Follow-ups</h3>
                            <p style="font-size:0.75rem;color:#64748b;">These leads need your call right now.</p>
                        </div>
                        <span id="overdueBadge" style="background:#fee2e2;color:#ef4444;font-weight:700;padding:4px 12px;border-radius:20px;font-size:0.75rem;">0 Overdue</span>
                    </div>
                    <div id="urgentPanel" style="min-height:320px;"><div style="padding:3rem;text-align:center;color:#94a3b8;"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div></div>
                </div>

                <!-- My Pipeline -->
                <div class="smart-panel premium-card" style="overflow:hidden;">
                    <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #e2e8f0;background:#f8fafc;">
                        <h3 style="font-size:1rem;font-weight:700;color:#0f172a;">📊 My Pipeline Stages</h3>
                    </div>
                    <div id="pipelineMiniView" style="padding:1.5rem;"></div>
                </div>
            </div>

            <!-- Chart -->
            <div class="chart-outer premium-card" style="padding:2rem;">
                <h3 style="font-size:1.125rem;font-weight:700;margin-bottom:1.5rem;">My Performance This Month</h3>
                <div style="height:280px;"><canvas id="performanceChart"></canvas></div>
            </div>
        </div>
    </main>
</div>
<script src="../../js/config.js"></script>
<script src="../../js/components.js"></script>
<script src="js/dashboard.js"></script>
<script src="../../js/decision-engine.js"></script>
</body>
</html>
