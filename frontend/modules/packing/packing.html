<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="dashboard-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <header class="topbar">
            <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="orderSearch" oninput="filterOrders()" placeholder="Search orders..."></div>
            <div class="profile-section"><span class="profile-name" id="profileName">Packing</span><div class="avatar"><i class="fa-solid fa-user"></i></div></div>
        </header>
        <div class="content-body">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <div>
                    <h1 style="font-size:1.5rem;font-weight:800;color:#1e293b;">📦 Packing Dashboard</h1>
                    <p style="color:#64748b;font-size:0.875rem;">Draft orders ready to be packed. Mark each one as packed to move it to billing.</p>
                </div>
                <div style="display:flex;align-items:center;gap:1rem;">
                    <span id="pendingCount" style="background:#8b5cf620;color:#8b5cf6;font-weight:700;padding:6px 16px;border-radius:20px;font-size:0.875rem;">0 Pending</span>
                    <button onclick="fetchOrders()" style="padding:0.5rem 1rem;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:0.875rem;color:#374151;display:flex;align-items:center;gap:0.4rem;"><i class="fas fa-refresh"></i> Refresh</button>
                </div>
            </div>

            <div class="premium-card" style="overflow:hidden;">
                <table style="width:100%;border-collapse:collapse;">
                    <thead style="background:#f8fafc;">
                        <tr>
                            <th style="padding:1rem 1.25rem;text-align:left;font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;">Order ID</th>
                            <th style="padding:1rem 1.25rem;text-align:left;font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;">Customer / Dealer</th>
                            <th style="padding:1rem 1.25rem;text-align:left;font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;">Phone</th>
                            <th style="padding:1rem 1.25rem;text-align:left;font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;">Items</th>
                            <th style="padding:1rem 1.25rem;text-align:left;font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;">Order Date</th>
                            <th style="padding:1rem 1.25rem;text-align:left;font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="packagingTableBody">
                        <tr><td colspan="6" style="padding:3rem;text-align:center;color:#94a3b8;"><i class="fas fa-circle-notch fa-spin"></i> Loading orders...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<div id="toast" class="toast" style="position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:white;padding:1rem 1.5rem;border-radius:10px;font-size:0.875rem;font-weight:600;display:none;z-index:9999;"></div>
<script src="../../js/config.js"></script>
<script src="../../js/components.js"></script>
<script src="../../js/decision-engine.js"></script>
<script src="js/packing.js"></script>
</body>
</html>
