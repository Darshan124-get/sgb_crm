<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Invoice | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #10b981;
            --primary-dark: #059669;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 2rem 0; }
        
        .invoice-container {
            background: white;
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .invoice-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 10px;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            border-radius: 24px 24px 0 0;
        }

        .btn-premium {
            background: #1e293b;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-premium:hover { background: #0f172a; transform: translateY(-1px); }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .invoice-container { 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 2rem !important;
                width: 100% !important;
                max-width: none !important;
                border-radius: 0 !important;
            }
            .invoice-container::before { display: none; }
        }
    </style>
</head>
<body>

    <div id="invoiceContent">
        <!-- Dynamic Content from invoice-view.js -->
        <div style="text-align:center; padding:10rem 0;">
            <i class="fas fa-circle-notch fa-spin" style="font-size:3rem; color:#10b981;"></i>
            <p style="margin-top:1.5rem; color:#64748b; font-weight:600; font-size:1.1rem;">Authenticating & Fetching Invoice Data...</p>
        </div>
    </div>

    <!-- Sticky Action Bar -->
    <div class="no-print" style="position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; gap:1rem; padding:1rem; background:rgba(30, 41, 59, 0.9); backdrop-filter:blur(12px); border-radius:2rem; box-shadow:0 20px 25px -5px rgba(0,0,0,0.3); z-index:1000;">
        <button onclick="window.print()" class="btn-premium">
            <i class="fas fa-print"></i> Print Invoice
        </button>
        <button onclick="window.close()" style="background:transparent; border:none; color:white; font-weight:600; padding:0 1rem; cursor:pointer;">Close</button>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/components.js"></script>
    <script src="js/invoice-view.js"></script>
</body>
</html>
