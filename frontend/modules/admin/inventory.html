<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products & Inventory | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .inventory-tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .inv-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .inv-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            padding: 1rem;
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .product-img {
            width: 100%;
            height: 160px;
            background: #f1f5f9;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #cbd5e1;
            object-fit: cover;
        }
        .stock-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .stock-in { background: #dcfce7; color: #166534; }
        .stock-low { background: #fffbeb; color: #92400e; }
        .stock-out { background: #fef2f2; color: #991b1b; }
        
        .cat-tree-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cat-tree-item:hover { background: #f8fafc; }
        .nested-cat { padding-left: 2rem; border-left: 2px solid #e2e8f0; }

        .inv-table-container {
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .inv-table {
            width: 100%;
            border-collapse: collapse;
        }
        .inv-table th {
            text-align: left;
            padding: 1rem;
            background: #f8fafc;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }
        .inv-table td {
            padding: 1rem;
            border-top: 1px solid #f1f5f9;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <header class="topbar">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="globalSearch" placeholder="Search products, SKUs...">
            </div>
            <div class="profile-section">
                <div id="lowStockWarning" class="hidden" style="color: #ef4444; margin-right: 1.5rem; cursor: pointer;">
                    <i class="fas fa-triangle-exclamation"></i> Low Stock Alert
                </div>
                <span class="profile-name" id="profileName">Administrator</span>
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
            </div>
        </header>

        <div class="content-body">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <div>
                    <h1 style="font-size:1.5rem; font-weight:800; color:#1e293b; margin-bottom:0.25rem;">Products & Inventory</h1>
                    <p style="color:#64748b; font-size:0.875rem;">Manage catalog, categories and track stock levels.</p>
                </div>
                <div style="display:flex; gap:0.75rem;">
                    <div style="display:flex; gap:0.5rem; margin-right:1rem;">
                        <select id="filterCategory" class="form-control-premium" style="width:160px; height:42px;">
                            <option value="all">All Categories</option>
                        </select>
                        <select id="filterStatus" class="form-control-premium" style="width:140px; height:42px;">
                            <option value="all">All Status</option>
                            <option value="in">In Stock</option>
                            <option value="low">Low Stock</option>
                            <option value="out">Out of Stock</option>
                        </select>
                    </div>
                    <button class="btn btn-outline" id="refreshDataBtn"><i class="fas fa-sync"></i> Refresh</button>
                    <button class="btn" id="addProductBtn" style="background:var(--primary-color); color:white;">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </div>
            </div>

            <div class="inventory-tabs">
                <div class="inv-tab active" data-tab="products">Products</div>
                <div class="inv-tab" data-tab="categories">Categories</div>
                <div class="inv-tab" data-tab="stock">Stock Management</div>
                <div class="inv-tab" data-tab="logs">Inventory Logs</div>
            </div>

            <div id="inventoryContent">
                <!-- Dynamic Content Here -->
                <div style="padding: 3rem; text-align: center; color: #94a3b8;">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top: 1rem;">Loading module assets...</p>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Root -->
<div id="globalModal" class="modal"></div>

<script src="../../js/config.js"></script>
<script src="../../js/components.js"></script>
<script src="../../js/decision-engine.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
