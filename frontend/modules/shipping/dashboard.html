<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Dashboard | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-light: #ddd6fe;
            --secondary: #10b981;
            --accent: #f59e0b;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .dashboard-wrapper { display: flex; min-height: 100vh; background: #f8fafc; }
        .main-content { flex: 1; padding: 1.5rem; overflow-y: auto; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .welcome-section h1 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 0.2rem; }
        .welcome-section p { color: #64748b; font-size: 0.85rem; }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .kpi-card {
            background: white;
            padding: 1.25rem;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06); }

        .kpi-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .icon-blue { background: #eff6ff; color: #3b82f6; }
        .icon-green { background: #ecfdf5; color: #10b981; }
        .icon-orange { background: #fff7ed; color: #f59e0b; }

        .kpi-info h3 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin: 0.1rem 0; }
        .kpi-info span { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 100px;
            margin-top: 0.25rem;
        }
        .status-pending { background: #eff6ff; color: #3b82f6; }
        .status-shipped { background: #ecfdf5; color: #10b981; }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 currentColor; }
            70% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 currentColor; }
        }

        /* Charts Layout */
        .charts-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.25rem;
        }

        .chart-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f1f5f9;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .chart-header h2 { font-size: 1rem; font-weight: 700; color: #1e293b; }

        .refresh-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .refresh-btn:hover { background: #f1f5f9; transform: scale(1.02); }

        /* Responsiveness */
        @media (max-width: 1200px) {
            .charts-container { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .dashboard-wrapper { flex-direction: column; }
            .main-content { padding: 1rem; }
            .kpi-grid { grid-template-columns: 1fr; }
            .dashboard-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <div class="dashboard-header">
                <div class="welcome-section">
                    <h1>Shipping Analytics</h1>
                    <p>Logistics intelligence for SGB Agro operations.</p>
                </div>
                <button class="refresh-btn" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i> Refresh Dash
                </button>
            </div>

            <!-- KPI Cards -->
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon-wrapper icon-blue">
                        <i class="fas fa-box-open"></i>
                    </div>
                    <div class="kpi-info">
                        <span>Ready to Ship</span>
                        <h3 id="pendingShipCount">0</h3>
                        <div class="status-badge status-pending">
                            <span class="pulse-dot"></span> Awaiting Dispatch
                        </div>
                    </div>
                </div>

                <div class="kpi-card">
                    <div class="kpi-icon-wrapper icon-green">
                        <i class="fas fa-truck-fast"></i>
                    </div>
                    <div class="kpi-info">
                        <span>Today's Dispatched</span>
                        <h3 id="todayShippedCount">0</h3>
                        <div class="status-badge status-shipped">
                            <span class="pulse-dot" style="background:#10b981"></span> Out for Delivery
                        </div>
                    </div>
                </div>

                <div class="kpi-card">
                    <div class="kpi-icon-wrapper icon-orange">
                        <i class="fas fa-route"></i>
                    </div>
                    <div class="kpi-info">
                        <span>Active In-Transit</span>
                        <h3 id="inTransitCount">0</h3>
                        <div class="status-badge" style="background: #fff7ed; color: #f59e0b;">
                            <i class="fas fa-location-dot"></i> Live Tracking
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="charts-container">
                <div class="chart-card">
                    <div class="chart-header">
                        <h2>Dispatch Trends</h2>
                        <select id="rangeSelector" style="font-size: 0.8rem; font-weight: 600; color: #475569; background: #f8fafc; padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0; outline: none; cursor: pointer;">
                            <option value="today">Today</option>
                            <option value="7days" selected>7 Days</option>
                        </select>
                    </div>
                    <div style="height: 280px;">
                        <canvas id="shippingTrendChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h2>Carrier Load</h2>
                    </div>
                    <div style="height: 280px;">
                        <canvas id="carrierChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/components.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
