<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing Dashboard | SGB Agro CRM</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard-wrapper">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search orders, customers...">
                </div>
                <div class="profile-section">
                    <span class="profile-name" id="profileName">Packing Staff</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <div class="content-body">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <div>
                        <h1 style="font-size:1.5rem; font-weight:800; color:#1e293b;">📊 Packing Dashboard</h1>
                        <p style="color:#64748b; font-size:0.875rem;">Daily packing performance and metrics overview.</p>
                    </div>
                    <div style="display:flex; align-items:center; gap:0.75rem;">
                        <button onclick="fetchDashboardStats()" class="login-btn" style="width:auto; padding:0.6rem 1.25rem; font-size:0.875rem; background:#8b5cf6;">
                            <i class="fas fa-sync-alt mr-2"></i> Refresh Data
                        </button>
                    </div>
                </div>

                <!-- KPI Cards -->
                <div class="dashboard-stats" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:1.5rem; margin-bottom:2rem;">
                    <div class="stat-card" style="background:white; padding:1.5rem; border-radius:1rem; border:1px solid #e2e8f0;">
                        <div style="display:flex; align-items:center; gap:1rem;">
                            <div style="width:48px; height:48px; border-radius:12px; background:#fef3c7; color:#d97706; display:flex; align-items:center; justify-content:center; font-size:1.25rem;">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div>
                                <p style="font-size:0.875rem; color:#64748b; margin:0;">Total Pending</p>
                                <h3 id="stat-pending" style="font-size:1.5rem; font-weight:800; color:#1e293b; margin:0;">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card" style="background:white; padding:1.5rem; border-radius:1rem; border:1px solid #e2e8f0;">
                        <div style="display:flex; align-items:center; gap:1rem;">
                            <div style="width:48px; height:48px; border-radius:12px; background:#dcfce7; color:#166534; display:flex; align-items:center; justify-content:center; font-size:1.25rem;">
                                <i class="fas fa-check-double"></i>
                            </div>
                            <div>
                                <p style="font-size:0.875rem; color:#64748b; margin:0;">Total Completed</p>
                                <h3 id="stat-completed" style="font-size:1.5rem; font-weight:800; color:#1e293b; margin:0;">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card" style="background:white; padding:1.5rem; border-radius:1rem; border:1px solid #e2e8f0;">
                        <div style="display:flex; align-items:center; gap:1rem;">
                            <div style="width:48px; height:48px; border-radius:12px; background:#ede9fe; color:#6d28d9; display:flex; align-items:center; justify-content:center; font-size:1.25rem;">
                                <i class="fas fa-calendar-day"></i>
                            </div>
                            <div>
                                <p style="font-size:0.875rem; color:#64748b; margin:0;">Today's Packed</p>
                                <h3 id="stat-today" style="font-size:1.5rem; font-weight:800; color:#1e293b; margin:0;">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Charts Section -->
                <div style="display:grid; grid-template-columns:2fr 1fr; gap:1.5rem; margin-bottom:2rem;">
                    <div class="premium-card" style="padding:1.5rem;">
                        <h3 style="font-size:1rem; font-weight:700; color:#1e293b; margin-bottom:1.5rem;">Packing Trends (Last 7 Days)</h3>
                        <div style="height:300px;">
                            <canvas id="packingTrendsChart"></canvas>
                        </div>
                    </div>
                    <div class="premium-card" style="padding:1.5rem;">
                        <h3 style="font-size:1rem; font-weight:700; color:#1e293b; margin-bottom:1.5rem;">Packing Status Distribution</h3>
                        <div style="height:300px; display:flex; align-items:center; justify-content:center;">
                            <canvas id="packingStatusChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Recent Activities Table -->
                <div class="premium-card">
                    <div style="padding:1.5rem; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="font-size:1rem; font-weight:700; color:#1e293b; margin:0;">Recently Packed Orders</h3>
                        <a href="packing.html" style="font-size:0.875rem; color:#8b5cf6; font-weight:600; text-decoration:none;">View All <i class="fas fa-arrow-right ml-1"></i></a>
                    </div>
                    <div style="overflow-x:auto;">
                        <table style="width:100%; border-collapse:collapse;">
                            <thead style="background:#f8fafc;">
                                <tr>
                                    <th style="padding:1rem 1.25rem; text-align:left; font-size:0.75rem; font-weight:700; color:#64748b; text-transform:uppercase;">Order ID</th>
                                    <th style="padding:1rem 1.25rem; text-align:left; font-size:0.75rem; font-weight:700; color:#64748b; text-transform:uppercase;">Customer</th>
                                    <th style="padding:1rem 1.25rem; text-align:left; font-size:0.75rem; font-weight:700; color:#64748b; text-transform:uppercase;">Packed At</th>
                                    <th style="padding:1rem 1.25rem; text-align:left; font-size:0.75rem; font-weight:700; color:#64748b; text-transform:uppercase;">Status</th>
                                </tr>
                            </thead>
                            <tbody id="recentPackingTable">
                                <!-- Data injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/components.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
